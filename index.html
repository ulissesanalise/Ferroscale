<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>FerroScale</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      z-index: 999999;
      transform: scale(0.5);
      transform-origin: 0 0;
    }
    body {
      zoom: 0.5;
    }
  </style>
</head>
<body>
  <iframe src="https://ferroscale.lovable.app" title="FerroScale"></iframe>
</body>
</html>
