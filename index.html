<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1300, initial-scale=0.1, user-scalable=yes" />
  <title>FerroScale</title>
  <style>
    /* Remove as margens e trava o scroll do body para não dar conflito */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f7fe; /* Cor de fundo padrão de dashboards */
    }

    /* O container do iframe permite a rolagem correta no iOS */
    .iframe-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* Ativa a rolagem suave no iPhone */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-wrapper">
    <iframe src="https://ferroscale.lovable.app" title="FerroScale"></iframe>
  </div>
</body>
</html>
